kind = "web"
previewPath = "/"
title = "Social Command Center"
version = "1.0.0"
id = "artifacts/social-command-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24176

[services.development]
run = "pnpm --filter @workspace/social-command-center run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-command-center", "run", "build" ]
publicDir = "artifacts/social-command-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24176"
BASE_PATH = "/"
